name: Harvest images

on:
  schedule:
    - cron: "0 */4 * * *"   # every 4 hours, 24/7
  workflow_dispatch:

jobs:
  harvest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run harvester
        run: python harvest.py

      - name: Commit new images
        run: |
          git config user.name "harvest-bot"
          git config user.email "actions@users.noreply.github.com"
          git add images manifest.json
          if git diff --cached --quiet; then
            echo "No new images this run."
          else
            git commit -m "harvest: new images $(date -u +%Y-%m-%d)"
            git push
          fi
